<!-- @dsCard group="Composants" name="Mini-stats (stat-pill)" subtitle="Pastilles colorées du tableau de bord" w="860" h="420" -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Composants — Stat pills</title>
  <link rel="stylesheet" href="../theme.css" />
</head>
<body>
  <div class="ds-page">
    <h1>Mini-cartes statistiques</h1>
    <p class="ds-lead"><code>.stat-pill</code> + modificateur de couleur (<code>.is-primary</code>, <code>.is-info</code>, <code>.is-accent</code>, <code>.is-warning</code>, <code>.is-success</code>, <code>.is-error</code>).</p>

    <div class="ds-specimen">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        <div class="stat-pill is-primary"><div class="stat-pill-num">24</div><div class="stat-pill-label">Pistes actives</div></div>
        <div class="stat-pill is-info"><div class="stat-pill-num">12</div><div class="stat-pill-label">Devis envoyés</div></div>
        <div class="stat-pill is-accent"><div class="stat-pill-num">7</div><div class="stat-pill-label">Relances</div></div>
        <div class="stat-pill is-warning"><div class="stat-pill-num">3</div><div class="stat-pill-label">En retard</div></div>
        <div class="stat-pill is-success"><div class="stat-pill-num">9</div><div class="stat-pill-label">Gagnés</div></div>
        <div class="stat-pill is-error"><div class="stat-pill-num">2</div><div class="stat-pill-label">Perdus</div></div>
      </div>
    </div>
  </div>
</body>
</html>
