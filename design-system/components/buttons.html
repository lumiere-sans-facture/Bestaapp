<!-- @dsCard group="Composants" name="Boutons" subtitle="Primary / accent / outline · 3 tailles · états" w="820" h="560" -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Composants — Boutons</title>
  <link rel="stylesheet" href="../theme.css" />
</head>
<body>
  <div class="ds-page">
    <h1>Boutons</h1>
    <p class="ds-lead">Base <code>.btn</code> + variante de couleur + (optionnel) taille. Largeur pleine avec <code>.btn-block</code>.</p>

    <div class="ds-specimen ds-stack">
      <div>
        <h2>Variantes</h2>
        <div class="ds-row">
          <button class="btn btn-primary">Primary</button>
          <button class="btn btn-accent">Accent</button>
          <button class="btn btn-outline">Outline</button>
          <button class="btn btn-won">Gagné</button>
          <button class="btn btn-lost">Perdu</button>
        </div>
      </div>

      <div>
        <h2>Tailles</h2>
        <div class="ds-row">
          <button class="btn btn-primary btn-sm">Petit (sm)</button>
          <button class="btn btn-primary">Normal</button>
          <button class="btn btn-primary btn-lg">Grand (lg)</button>
        </div>
      </div>

      <div>
        <h2>États</h2>
        <div class="ds-row">
          <button class="btn btn-primary">Actif</button>
          <button class="btn btn-primary" disabled>Désactivé</button>
        </div>
      </div>

      <div>
        <h2>Pleine largeur</h2>
        <button class="btn btn-accent btn-block">Créer le devis</button>
      </div>
    </div>
  </div>
</body>
</html>
