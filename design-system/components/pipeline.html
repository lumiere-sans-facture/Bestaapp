<!-- @dsCard group="Composants" name="Pipeline (stepper & carte)" subtitle="Stepper en chevrons + carte kanban" w="860" h="520" -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Composants — Pipeline</title>
  <link rel="stylesheet" href="../theme.css" />
</head>
<body>
  <div class="ds-page">
    <h1>Pipeline</h1>
    <p class="ds-lead">Stepper d'étapes en chevrons (<code>.stage-stepper</code>) et carte d'affaire (<code>.kanban-card</code>).</p>

    <div class="ds-specimen" style="margin-bottom:16px">
      <h2>Stepper d'étapes</h2>
      <div class="stage-stepper">
        <div class="stage-step reached">Nouveau</div>
        <div class="stage-step reached">Contacté</div>
        <div class="stage-step current">Devis</div>
        <div class="stage-step">Négociation</div>
        <div class="stage-step">Gagné</div>
      </div>
    </div>

    <div class="ds-specimen">
      <h2>Carte kanban</h2>
      <div class="kanban-card" style="max-width:280px">
        <div class="kanban-card-title">Installation 5 kWh — Villa Cocotiers</div>
        <div class="kanban-card-contact">Aminata D. · +229 01 23 45 67</div>
        <div class="kanban-card-footer">
          <span class="kanban-card-value">1 544 000 F</span>
          <span class="assignee-avatar">BS</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
