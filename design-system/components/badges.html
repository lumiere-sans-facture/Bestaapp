<!-- @dsCard group="Composants" name="Badges & puces" subtitle="Badges sémantiques, chips de catégorie" w="760" h="420" -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Composants — Badges</title>
  <link rel="stylesheet" href="../theme.css" />
</head>
<body>
  <div class="ds-page">
    <h1>Badges & puces</h1>
    <p class="ds-lead">Étiquettes courtes. <code>.badge</code> pour les statuts, <code>.category-chip</code> pour les filtres.</p>

    <div class="ds-specimen ds-stack">
      <div>
        <h2>Badges de statut</h2>
        <div class="ds-row">
          <span class="badge badge-success">Payé</span>
          <span class="badge badge-warning">En attente</span>
          <span class="badge badge-muted">Brouillon</span>
        </div>
      </div>

      <div>
        <h2>Puces de catégorie (filtres)</h2>
        <div class="ds-row">
          <button class="category-chip active">Tous</button>
          <button class="category-chip">Panneaux</button>
          <button class="category-chip">Onduleurs</button>
          <button class="category-chip">Batteries</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
